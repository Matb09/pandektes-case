name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pandektes
          POSTGRES_PASSWORD: pandektes_secret
          POSTGRES_DB: pandektes
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pandektes"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: pandektes
      DATABASE_PASSWORD: pandektes_secret
      DATABASE_NAME: pandektes
      NODE_ENV: test
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --ci --coverage

      - name: Build
        run: npm run build

      - name: E2E tests
        if: env.OPENAI_API_KEY != ''
        run: npm run test:e2e -- --ci
